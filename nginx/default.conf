server {
    listen 80;
    
    # Internal Docker DNS resolver with a 30-second TTL cache
    resolver 127.0.0.11 valid=30s;
    
    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (Passes /api/... directly to backend)
    location /api/ {
        set $backend_upstream backend:5000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (Resilient to backend container restarts)
    location /health {
        set $backend_upstream backend:5000;
        proxy_pass http://$backend_upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}