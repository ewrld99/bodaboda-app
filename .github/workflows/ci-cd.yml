name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: bodaboda-app

jobs:
  build-app:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-app
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bodaboda
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bodaboda
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: tests
    # Ensure Docker steps only trigger on main branch push if tests pass (Task 6)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define Image Tags (Task 5)
        id: meta
        run: |
          # Create tag variables for both the unique SHA version and latest
          SHA_TAG="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

          echo "version_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Login to DockerHub (Task 1 & 2)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image (Task 2 & 5)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to Production Cloud (AWS)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKER_IMAGE: ${{ needs.docker.outputs.image_tag }}
    steps:
      - name: Start ssh-agent and add private key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.AWS_SSH_KEY }}

      - name: Copy docker-compose.yml to remote via SCP
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:bodaboda-app/docker-compose.yml
        shell: bash

      - name: Deploy Application via SSH (Task 3)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: DOCKER_IMAGE,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            cd bodaboda-app

            # Fixed broken login syntax from original file
            echo "$DOCKER_PASSWORD" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "Deploying targeted version: $DOCKER_IMAGE"

            # Export variable so Docker Compose can substitute it in docker-compose.yml
            export DOCKER_IMAGE=$DOCKER_IMAGE

            sudo -E docker compose pull
            sudo -E docker compose up -d --force-recreate
            sudo docker image prune -f
