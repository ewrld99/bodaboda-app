name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  BACKEND_IMAGE_NAME: bodaboda-app-backend
  NGINX_IMAGE_NAME: bodaboda-app-nginx

jobs:
  build-app:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-app
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bodaboda
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mqtt:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
          - 9001:9001
        options: >-
          --health-cmd="mosquitto_pub -h localhost -t healthcheck -m ping || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bodaboda
      MQTT_HOST: localhost
      MQTT_PORT: 1883
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest

  docker:
    name: Build Docker Image and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      backend_image_tag: ${{ steps.meta-backend.outputs.version_tag }}
      nginx_image_tag: ${{ steps.meta-nginx.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Define Backend Image Tags
        id: meta-backend
        run: |
          SHA_TAG="${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
          echo "version_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Define Nginx Image Tags
        id: meta-nginx
        run: |
          SHA_TAG="${{ secrets.DOCKER_USERNAME }}/${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ secrets.DOCKER_USERNAME }}/${{ env.NGINX_IMAGE_NAME }}:latest"
          echo "version_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and Push Nginx Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          cache-from: type=local,src=/tmp/.buildx-cache-new
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: Deploy to Server / Cloud
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKER_IMAGE: ${{ needs.docker.outputs.backend_image_tag }}
      DOCKER_NGINX_IMAGE: ${{ needs.docker.outputs.nginx_image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start ssh-agent and add private key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.AWS_SSH_KEY }}

      - name: Copy docker-compose.yml to remote via SCP
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:bodaboda-app/docker-compose.yml
        shell: bash

      - name: Deploy Application via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          DOCKER_NGINX_IMAGE: ${{ env.DOCKER_NGINX_IMAGE }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: DOCKER_IMAGE,DOCKER_NGINX_IMAGE,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            cd bodaboda-app

            echo "$DOCKER_PASSWORD" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "Deploying backend: $DOCKER_IMAGE"
            echo "Deploying nginx: $DOCKER_NGINX_IMAGE"

            export DOCKER_IMAGE=$DOCKER_IMAGE
            export DOCKER_NGINX_IMAGE=$DOCKER_NGINX_IMAGE

            sudo -E docker compose pull
            sudo -E docker compose up -d --force-recreate
            sudo docker image prune -f
