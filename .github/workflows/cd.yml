name: CD Pipeline

on:
  workflow_run:
    workflows: ["Flask CI Pipeline"]
    types:
      - completed

jobs:
  push-docker-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set Docker Image
        id: image
        run: |
          echo "image=${{ secrets.DOCKER_USERNAME }}/bodaboda-app:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ steps.image.outputs.image }} \
            ./backend

      - name: Push Docker Image
        run: |
          docker push ${{ steps.image.outputs.image }}

  deploy-staging:
    needs: push-docker-image
    runs-on: ubuntu-latest
    environment: staging

    env:
      DOCKER_IMAGE: ${{ needs.push-docker-image.outputs.image }}

    steps:
      - name: Deploy to AWS Staging
        uses: appleboy/ssh-action@v1.2.0

        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: DOCKER_IMAGE

          script: |
            cd bodaboda-app

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" \
              --password-stdin

            export DOCKER_IMAGE=$DOCKER_IMAGE

            sudo docker compose down || true

            sudo docker compose pull

            sudo docker compose up -d --force-recreate

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Wait for app startup
        run: sleep 20

      - name: Run Health Check
        run: |
          curl --fail http://${{ secrets.AWS_HOST }}:5000/health

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest

    environment:
      name: production

    env:
      DOCKER_IMAGE: ${{ needs.push-docker-image.outputs.image }}

    steps:
      - name: Deploy Production
        uses: appleboy/ssh-action@v1.2.0

        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: DOCKER_IMAGE

          script: |
            cd bodaboda-app

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" \
              --password-stdin

            export DOCKER_IMAGE=$DOCKER_IMAGE

            sudo docker compose down || true

            sudo docker compose pull

            sudo docker compose up -d --force-recreate
